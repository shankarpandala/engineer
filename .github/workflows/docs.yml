name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "docs"
  cancel-in-progress: true

jobs:
  build:
    name: Build & Deploy Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Check out ml4t-specs
        uses: actions/checkout@v4
        with:
          repository: ml4t/specs
          path: ml4t-specs

      - name: Link ml4t-specs sibling path
        run: ln -s "$GITHUB_WORKSPACE/ml4t-specs" ../ml4t-specs

      - name: Install dependencies
        run: uv sync --dev --extra docs

      - name: Build docs
        run: uv run mkdocs build --strict

      - name: Deploy to website repo
        uses: cpina/github-action-push-to-another-repository@v1.7.2
        env:
          SSH_DEPLOY_KEY: ${{ secrets.DOCS_DEPLOY_KEY }}
        with:
          source-directory: site/
          destination-github-username: ml4t
          destination-repository-name: website
          target-directory: static/docs/engineer/
          target-branch: main
          commit-message: "docs(engineer): update from ml4t/engineer@${{ github.sha }}"
          user-name: ml4t-bot
          user-email: bot@ml4trading.io
