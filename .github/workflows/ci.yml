name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Check out ml4t-specs
        uses: actions/checkout@v4
        with:
          repository: ml4t/specs
          path: ml4t-specs

      - name: Link ml4t-specs sibling path
        run: ln -s "$GITHUB_WORKSPACE/ml4t-specs" ../ml4t-specs

      - name: Install dependencies
        run: uv sync --dev

      - name: Run ruff check
        run: uv run ruff check src/ tests/

      - name: Run ruff format check
        run: uv run ruff format --check src/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Check out ml4t-specs
        uses: actions/checkout@v4
        with:
          repository: ml4t/specs
          path: ml4t-specs

      - name: Link ml4t-specs sibling path
        run: ln -s "$GITHUB_WORKSPACE/ml4t-specs" ../ml4t-specs

      - name: Install dependencies
        run: uv sync --dev

      - name: Run ty check
        run: uv run ty check

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install TA-Lib C library
        run: |
          wget -q http://prdownloads.sourceforge.net/ta-lib/ta-lib-0.4.0-src.tar.gz
          tar -xzf ta-lib-0.4.0-src.tar.gz
          cd ta-lib/
          ./configure --prefix=/usr/local
          make
          sudo make install
          sudo ldconfig

      - name: Check out ml4t-specs
        uses: actions/checkout@v4
        with:
          repository: ml4t/specs
          path: ml4t-specs

      - name: Link ml4t-specs sibling path
        run: ln -s "$GITHUB_WORKSPACE/ml4t-specs" ../ml4t-specs

      - name: Install dependencies
        run: uv sync --dev --extra ta

      - name: Run tests
        run: |
          set +e
          uv run pytest tests/ -v --tb=short -x --no-cov
          PYTEST_EXIT=$?
          if [ $PYTEST_EXIT -eq 0 ] || [ $PYTEST_EXIT -eq 5 ]; then
            echo "Tests passed (exit code: $PYTEST_EXIT)"
            exit 0
          elif [ $PYTEST_EXIT -gt 128 ]; then
            echo "Tests passed but process crashed during cleanup (exit code: $PYTEST_EXIT) - known numba issue"
            exit 0
          else
            echo "Tests failed (exit code: $PYTEST_EXIT)"
            exit $PYTEST_EXIT
          fi

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Build package
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
